version: '3.8'

services:
  web:
    build: .
    container_name: stanytz-website
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - stanytz-network

networks:
  stanytz-network:
    driver: bridge

